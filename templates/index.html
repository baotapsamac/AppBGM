<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppBGM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css"/>
<link rel="stylesheet" href="/static/style.css?v=3">
<script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-title">
    <h1>Công cụ tạo bài giảng v1.4</h1>
  </div>
  <div class="mode-switcher" style="display: flex; gap: 4px; background: rgba(255,255,255,0.15); padding: 3px; border-radius: 6px;">
    <button id="btnViewForm" class="btn btn-sm btn-mode active" style="background:#fff; color:var(--navy); font-weight:bold;" data-tip="Chế độ Form nhập chi tiết & Xem trước PDF">📑 Xem Chi Tiết & PDF</button>
    <button id="btnViewMatrix" class="btn btn-sm btn-mode" style="background:transparent; color:#fff;" data-tip="Chế độ Bảng tính ma trận song song giống Excel">📊 Bảng Soạn Bài Giảng</button>
  </div>
  <div class="topbar-right">
    <button id="btnHints" class="hint-toggle" data-tip="Bật/tắt phần chú thích hướng dẫn cho các nút trong công cụ" aria-pressed="true">💡 Hướng dẫn</button>
    <div class="topbar-status" id="statusBox">Chưa nạp dữ liệu</div>
  </div>
</header>

<main class="workspace" id="mainWorkspace">
  <aside class="panel-form" id="panelForm">
    <section class="uploader" id="uploader">
      <div style="display: flex; gap: 6px;">
        <button id="dropXlsx" class="btn btn-outline btn-sm" style="flex:1" data-tip="Bấm để nạp file dữ liệu Excel sẵn có từ máy tính">📂 Nạp file dữ liệu Excel</button>
        <button id="btnExportData" class="btn btn-outline btn-sm" style="flex:1" data-tip="Xuất toàn bộ dữ liệu bài giảng vừa nhập ra file Excel để lưu trữ và nạp lại sau này">💾 Lưu file dữ liệu (.xlsx)</button>
      </div>
      <div style="display: flex; gap: 6px; margin-top: 4px;">
        <button id="btnDownloadTemplate" class="btn btn-outline btn-sm" style="flex:1" data-tip="Tải file Excel mẫu được định dạng chuẩn">Tải file mẫu Excel</button>
        <button id="btnSavePreset" class="btn btn-outline btn-sm" style="flex:1" data-tip="Lưu các thông tin đơn vị & người phê duyệt làm mẫu mặc định">💾 Lưu Mẫu Thông Tin</button>
        <button id="btnLoadPreset" class="btn btn-outline btn-sm" style="flex:1" data-tip="Nạp thông tin đơn vị & người phê duyệt đã lưu trước đó">📂 Tải Mẫu Thông Tin</button>
      </div>
      <div id="warnBox" class="warn-box" hidden></div>
    </section>

    <div class="tab-filter-row" id="tabFilterRow" hidden>
      <input type="text" id="tabFilter" class="tab-filter" placeholder="Tìm bài giảng theo tên…">
      <button id="btnDuplicateLecture" class="btn btn-outline btn-sm" style="margin-left: 6px;" data-tip="Tạo bản sao từ bài giảng đang chọn">📋 Nhân bản</button>
    </div>
    
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-top: 4px;">
      <div class="lecture-tabs" id="lectureTabs" style="flex:1;"></div>
      <button id="btnAddLecture" class="btn btn-primary btn-sm" style="white-space: nowrap;" data-tip="Tạo thêm 1 bài giảng mới">➕ Thêm bài mới</button>
    </div>

    <div class="form-scroll" id="fieldForm">
      <p class="form-empty">Đang nạp dữ liệu…</p>
    </div>
    <div class="form-actions">
      <div class="form-actions-buttons">
        <button id="btnExportOne" class="btn btn-primary" style="flex:1;" disabled data-tip="Tải xuống bài giảng đang chọn dưới dạng file Word">Xuất bài này (.docx)</button>
        <button id="btnExportAll" class="btn btn-outline" style="flex:1;" disabled data-tip="Tick chọn các bài giảng; bấm để đóng gói thành 1 file .zip Word">Xuất tất cả (.zip)</button>
      </div>
      <div class="export-progress" id="exportProgress" hidden>
        <span class="spinner"></span>
        <span id="exportProgressText">Đang xuất…</span>
      </div>
    </div>
    <div class="author-footer" style="margin-top: 10px; text-align: center; font-size: 12px; color: #5B5B57;">
      Tác giả Nguyễn Mạnh Hùng - Khoa Vũ khí
    </div>
  </aside>

  <section class="panel-matrix" id="panelMatrix" style="display:none; flex:1; background:#fff; overflow:auto; padding:16px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h3 style="margin:0; color:var(--navy);">📊 Bảng Soạn Bài Giảng Song Song (Ma Trận Excel)</h3>
      <button id="btnAddLectureMatrix" class="btn btn-primary btn-sm">➕ Thêm bài mới</button>
    </div>
    <div id="matrixTableWrapper"></div>
  </section>

  <section class="panel-preview">
    <div class="preview-toolbar">
      <div class="preview-toolbar-title" style="display: flex; align-items: center; gap: 8px;">
        <span>Xem trước</span>
        <span class="spinner" id="previewSpinner" hidden></span>
      </div>
      <div class="preview-toolbar-actions" style="display: flex; gap: 8px;">
        <button id="btnDirectEdit" class="btn btn-warning btn-sm" disabled data-tip="Mở LibreOffice Writer để chỉnh sửa bài giảng này trực tiếp">✏️ Chỉnh sửa trực tiếp</button>
        <button id="btnCompleteEdit" class="btn btn-success btn-sm" hidden data-tip="Bấm sau khi đã chỉnh sửa xong trên LibreOffice để cập nhật ngay bản xem trước PDF">✅ Hoàn tất</button>
      </div>
    </div>
    <iframe id="previewFrame" title="Bản xem trước PDF"></iframe>
  </section>
</main>

  <div id="customContextMenu" class="custom-context-menu" hidden>
    <div class="menu-item" id="ctxUndo">↺ Hoàn tác thao tác trước</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="ctxCopy">📋 Sao chép nội dung</div>
    <div class="menu-item" id="ctxPaste">📥 Dán nội dung</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="ctxSyncField">⏩ Áp dụng ô này cho tất cả bài giảng</div>
    <div class="menu-item" id="ctxClear">🧹 Xóa sạch nội dung ô này</div>
  </div>

  <script src="/static/script.js?v=9"></script>
</body>
</html>
