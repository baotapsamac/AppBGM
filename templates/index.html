<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppBGM v1.6</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css"/>
<link rel="stylesheet" href="/static/style.css?v=4">
<script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-title">
    <h1>AppBGM v1.6</h1>
  </div>
  <div class="mode-switcher" style="display: flex; gap: 4px; background: rgba(255,255,255,0.15); padding: 3px; border-radius: 6px;">
    <button id="btnViewMatrix" class="btn btn-sm btn-mode" style="background:transparent; color:#fff;" data-tip="Chế độ Bảng tính ma trận song song giống Excel">📊 Soạn bài giảng</button>
    <button id="btnViewForm" class="btn btn-sm btn-mode active" style="background:#fff; color:var(--navy); font-weight:bold;" data-tip="Chế độ Form nhập chi tiết & Xem trước PDF">📑 Xem và kiểm tra</button>
  </div>
  <div class="topbar-right">
    <button id="btnHints" class="hint-toggle" data-tip="Bật/tắt phần chú thích hướng dẫn cho các nút trong công cụ" aria-pressed="true">💡 Hướng dẫn</button>
    <div class="topbar-status" id="statusBox">Chưa nạp dữ liệu</div>
  </div>
</header>

<main class="workspace" id="mainWorkspace">
  <aside class="panel-form" id="panelForm">
    <section class="uploader" id="uploader">
      <!-- HÀNG 1: Quản lý Bài giảng Excel -->
      <div style="display: flex; gap: 4px;">
        <button id="dropXlsx" class="btn btn-outline btn-sm" style="flex:1" data-tip="Tải file Excel dữ liệu bài giảng lên hệ thống">📂 Nạp Bài giảng</button>
        <button id="btnExportData" class="btn btn-outline btn-sm" style="flex:1" data-tip="Xuất toàn bộ bài giảng ra file Excel (.xlsx) để lưu trữ">💾 Xuất bài giảng</button>
        <button id="btnDownloadTemplate" class="btn btn-outline btn-sm" style="flex:1" data-tip="Tải file Excel mẫu được định dạng chuẩn">📥 Tải mẫu BG</button>
      </div>
      <!-- HÀNG 2: Quản lý Thông tin Hành chính (Phần I) -->
      <div style="display: flex; gap: 4px; margin-top: 4px;">
        <button id="btnSavePreset" class="btn btn-outline btn-sm" style="flex:1" data-tip="Ghi lại toàn bộ thông tin Phần I ra file mẫu (.txt)">💾 Lưu Thông tin</button>
        <button id="btnLoadPreset" class="btn btn-outline btn-sm" style="flex:1" data-tip="Nạp dữ liệu Phần I mới từ file mẫu (.txt)">📂 Thay thông tin</button>
      </div>
      <div id="warnBox" class="warn-box" hidden></div>
    </section>
    
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 4px; margin-top: 4px; padding: 0 4px;">
      <div class="lecture-tabs" id="lectureTabs" style="flex:1;"></div>
      <div style="display: flex; gap: 3px; flex-shrink: 0;">
        <button id="btnAddLecture" class="btn btn-primary btn-sm btn-icon-add" data-tip="Tạo thêm 1 bài giảng mới" title="Thêm bài giảng mới">➕</button>
        <button id="btnDuplicateLecture" class="btn btn-outline btn-sm btn-icon-add" data-tip="Tạo bản sao từ bài giảng đang chọn" title="Nhân bản bài giảng">📑</button>
      </div>
    </div>

    <div class="form-scroll" id="fieldForm">
      <p class="form-empty">Đang nạp dữ liệu…</p>
    </div>
    <div class="form-actions">
      <div class="form-actions-buttons">
        <button id="btnExportOne" class="btn btn-primary" style="flex:1;" disabled data-tip="Tải xuống bài giảng đang chọn dưới dạng file Word">Xuất bài này (.docx)</button>
        <button id="btnExportAll" class="btn btn-outline" style="flex:1;" disabled data-tip="Tick chọn các bài giảng; bấm để đóng gói thành 1 file .zip Word">Xuất tất cả (.zip)</button>
      </div>
      <div class="export-progress" id="exportProgress" hidden>
        <span class="spinner"></span>
        <span id="exportProgressText">Đang xuất…</span>
      </div>
    </div>
    <div class="author-footer" style="margin-top: 10px; text-align: center; font-size: 12px; color: #5B5B57;">
      Tác giả Nguyễn Mạnh Hùng - Khoa Vũ khí
    </div>
  </aside>

  <section class="panel-matrix" id="panelMatrix" style="display:none; flex:1; background:#fff; overflow:auto; padding:16px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h3 style="margin:0; color:var(--navy);">📊 Soạn Bài Giảng</h3>
    </div>
    <div id="matrixTableWrapper"></div>
  </section>

  <section class="panel-preview">
    <div class="preview-toolbar">
      <div class="preview-toolbar-title" style="display: flex; align-items: center; gap: 8px;">
        <span>Xem trước</span>
        <span class="spinner" id="previewSpinner" hidden></span>
      </div>
      <div class="preview-toolbar-actions" style="display: flex; gap: 8px;">
        <button id="btnDirectEdit" class="btn btn-warning btn-sm" disabled data-tip="Mở LibreOffice Writer để chỉnh sửa bài giảng này trực tiếp">✏️ Chỉnh sửa trực tiếp</button>
        <button id="btnCompleteEdit" class="btn btn-success btn-sm" hidden data-tip="Bấm sau khi đã chỉnh sửa xong trên LibreOffice để cập nhật ngay bản xem trước PDF">✅ Hoàn tất</button>
      </div>
    </div>
    <iframe id="previewFrame" title="Bản xem trước PDF"></iframe>
  </section>
</main>

  <div id="customContextMenu" class="custom-context-menu" hidden>
    <div class="menu-item" id="ctxUndo">↺ Hoàn tác thao tác trước</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="ctxCopy">📋 Sao chép nội dung</div>
    <div class="menu-item" id="ctxPaste">📥 Dán nội dung</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="ctxSyncField">⏩ Áp dụng ô này cho tất cả bài giảng</div>
    <div class="menu-item" id="ctxClear">🧹 Xóa sạch nội dung ô này</div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="/static/script.js?v=10"></script>
</body>
</html>
